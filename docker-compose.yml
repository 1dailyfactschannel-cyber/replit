services:
  # Backend API Server
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teamsync-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://db_test:D2rGkB6CaIwpb@10.30.0.136:5532/db_test
      SESSION_SECRET: teamsync_prod_secret_2026
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
    ports:
      - "3245:3000"
    networks:
      - teamsync-network

  # Frontend Client with Nginx
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: teamsync-client
    restart: unless-stopped
    ports:
      - "8090:80"
    depends_on:
      - server
    networks:
      - teamsync-network

networks:
  teamsync-network:
    driver: bridge
