services:
  # Backend API Server
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teamsync-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      REDIS_URL: ${REDIS_URL:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8090,http://localhost:3000}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      APP_URL: ${APP_URL:-http://localhost:8090}
    ports:
      - "3245:3000"
    networks:
      - portal_teamsync-network
    depends_on:
      - client

  # Frontend Client with Nginx
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: teamsync-client
    restart: unless-stopped
    ports:
      - "8090:80"
    networks:
      - portal_teamsync-network

networks:
  portal_teamsync-network:
    driver: bridge
