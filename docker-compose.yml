services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: teamsync-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-db_test}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-db_test}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-db_test} -d ${DB_NAME:-db_test}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - teamsync-network

  # Backend API Server
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teamsync-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-db_test}:${DB_PASSWORD}@db:5432/${DB_NAME:-db_test}
      SESSION_SECRET: ${SESSION_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - teamsync-network

  # Frontend Client with Nginx
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: teamsync-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - teamsync-network

networks:
  teamsync-network:
    driver: bridge

volumes:
  postgres_data: