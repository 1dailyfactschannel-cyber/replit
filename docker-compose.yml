services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-slim
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-41ay45zOtztm2x}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5532:5432"
    networks:
      - pg_valentin_teamsync-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teamsync-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:41ay45zOtztm2x@postgres:5432/postgres
      SESSION_SECRET: ${SESSION_SECRET:-change_this_secret_key_to_random_string}
      REDIS_URL: ${REDIS_URL:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8090,http://localhost:3000}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      APP_URL: ${APP_URL:-http://localhost:8090}
    ports:
      - "3245:3000"
    networks:
      - pg_valentin_teamsync-network
    depends_on:
      postgres:
        condition: service_healthy
      client:
        condition: service_started

  # Frontend Client with Nginx
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: teamsync-client
    restart: unless-stopped
    ports:
      - "8090:80"
    networks:
      - pg_valentin_teamsync-network

networks:
  pg_valentin_teamsync-network:
    name: pg_valentin_teamsync-network
    driver: bridge

volumes:
  postgres_data:
