<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>m4portal - Управление проектами</title>
    <meta name="description" content="Управляйте проектами, командой и задачами в одном месте." />

    <!-- Preconnect для ускорения загрузки -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preload критических ресурсов -->
    <link rel="preload" href="/favicon.png" as="image">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style">
    
    <!-- CSS с font-display=swap для мгновенного отображения текста -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <meta property="og:title" content="m4portal - Управление проектами" />
    <meta property="og:description" content="Управляйте проектами, командой и задачами в одном месте." />
    <meta property="og:type" content="website" />
    
    <link rel="icon" type="image/png" href="/favicon.png" />
    
    <!-- Критические CSS для мгновенного отображения -->
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
      body { 
        background: #0f172a; 
        color: #f8fafc;
        min-height: 100vh;
      }
      #root { min-height: 100vh; }
      /* Спиннер загрузки */
      .initial-loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #334155;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Начальный лоадер, пока загружается React -->
      <div class="initial-loader">
        <div class="spinner"></div>
        <p style="color: #94a3b8; font-size: 14px;">Загрузка...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
