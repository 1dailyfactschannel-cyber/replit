<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <meta property="og:title" content="m4portal - Управление проектами" />
    <meta property="og:description" content="Управляйте проектами, командой и задачами в одном месте." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@teamsync" />
    <meta name="twitter:title" content="m4portal - Управление проектами" />
    <meta name="twitter:description" content="Управляйте проектами, командой и задачами в одном месте." />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    
    <!-- Preconnect to critical domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    
    <!-- Load fonts with display=swap -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Preload critical CSS -->
    <style>
      /* Critical CSS for initial render */
      html { font-family: 'Inter', sans-serif; }
      body { margin: 0; min-height: 100vh; background: hsl(210 40% 98%); }
      #root { min-height: 100vh; }
      
      /* Initial loading spinner */
      .initial-loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        z-index: 9999;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e2e8f0;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @media (prefers-color-scheme: dark) {
        body { background: hsl(222 47% 11%); color: hsl(210 40% 98%); }
        .spinner { border-color: #334155; border-top-color: #3b82f6; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Initial loader shown while React loads -->
      <div class="initial-loader">
        <div class="spinner"></div>
        <p style="color: #64748b; font-size: 14px; margin: 0;">Загрузка...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
